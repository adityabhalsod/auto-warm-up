# =============================================================
#  GitHub Actions CI/CD Pipeline — Auto Warm-Up
#  4-Stage Pipeline: Prepare → Build → Sign → Release
#  Builds Windows .exe on ubuntu-latest via Docker (Wine)
#
#  Signing options (in priority order):
#    1. SignPath.io (free for OSS) — real CA certificate, Publisher shown
#       Set secrets: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID,
#                    SIGNPATH_SIGNING_POLICY_SLUG, SIGNPATH_PROJECT_SLUG
#    2. Custom PFX certificate — any CA-issued .pfx
#       Set secrets: CODESIGN_PFX_BASE64, CODESIGN_PFX_PASSWORD
#    3. Self-signed fallback — no secrets needed (Publisher hidden)
# =============================================================

name: Build & Release

# Trigger on pushes to release branches only
on:
  push:
    branches:
      - main    # Stable releases (v1.0.0)
      - beta    # Pre-release beta builds (v1.0.0-beta.3)
      - alpha   # Pre-release alpha builds (v1.0.0-alpha.7)

# Only one release per branch at a time; cancel in-progress runs
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # =========================================================
  #  STAGE 1: PREPARE — Compute version, changelog, channel
  # =========================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest

    # Skip CI if commit message contains [skip ci] or [ci skip]
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    outputs:
      # Expose computed values to downstream jobs
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      channel: ${{ steps.version.outputs.channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      # Check out the full repo history (needed for commit counting)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for commit count and changelog

      # Compute semantic version based on branch and commit count
      - name: Compute version
        id: version
        run: |
          # Read base version from the VERSION file (e.g. 1.0.0)
          BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          # Get the current branch name
          BRANCH="${GITHUB_REF_NAME}"
          # Count total commits on this branch for pre-release suffix
          COMMIT_COUNT=$(git rev-list --count HEAD)

          # Determine release channel and tag format based on branch
          if [ "$BRANCH" = "main" ]; then
            # Stable release: version matches VERSION file exactly
            VERSION="$BASE_VERSION"
            TAG="v${VERSION}"
            CHANNEL="stable"
            PRERELEASE="false"
          elif [ "$BRANCH" = "beta" ]; then
            # Beta pre-release: append -beta.<commit_count>
            VERSION="${BASE_VERSION}-beta.${COMMIT_COUNT}"
            TAG="v${VERSION}"
            CHANNEL="beta"
            PRERELEASE="true"
          elif [ "$BRANCH" = "alpha" ]; then
            # Alpha pre-release: append -alpha.<commit_count>
            VERSION="${BASE_VERSION}-alpha.${COMMIT_COUNT}"
            TAG="v${VERSION}"
            CHANNEL="alpha"
            PRERELEASE="true"
          fi

          # Export computed values as step outputs
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

          # Log the computed version info for debugging
          echo "📦 Version: ${VERSION}"
          echo "🏷️  Tag: ${TAG}"
          echo "📡 Channel: ${CHANNEL}"

      # Generate a conventional-commit-style changelog since the last tag
      - name: Generate changelog
        id: changelog
        run: |
          # Find the most recent tag to use as the changelog baseline
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # No prior tag exists — include all commits
            COMMIT_RANGE="HEAD"
          else
            # Use commits since the last tag
            COMMIT_RANGE="${LAST_TAG}..HEAD"
          fi

          # Build categorized changelog from conventional commit prefixes
          CHANGELOG=""

          # Collect feature commits (feat: prefix)
          FEATURES=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" --grep="^feat:" 2>/dev/null || true)
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### ✨ Features\n${FEATURES}\n\n"
          fi

          # Collect bug fix commits (fix: prefix)
          FIXES=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" --grep="^fix:" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIXES}\n\n"
          fi

          # Collect performance improvement commits (perf: prefix)
          PERF=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" --grep="^perf:" 2>/dev/null || true)
          if [ -n "$PERF" ]; then
            CHANGELOG="${CHANGELOG}### ⚡ Performance\n${PERF}\n\n"
          fi

          # Collect documentation commits (docs: prefix)
          DOCS=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" --grep="^docs:" 2>/dev/null || true)
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### 📚 Documentation\n${DOCS}\n\n"
          fi

          # Fallback: if no conventional commits found, list all commits
          if [ -z "$CHANGELOG" ]; then
            ALL_COMMITS=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" 2>/dev/null || true)
            if [ -n "$ALL_COMMITS" ]; then
              CHANGELOG="### 📝 Changes\n${ALL_COMMITS}\n"
            else
              CHANGELOG="### 📝 Changes\n- Initial release\n"
            fi
          fi

          # Write changelog to output using heredoc delimiter for multiline
          {
            echo "changelog<<CHANGELOG_EOF"
            echo -e "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # =========================================================
  #  STAGE 2: BUILD — Compile .exe natively on Windows with Nuitka
  #
  #  We intentionally use a native Windows runner + Nuitka instead
  #  of Ubuntu + Docker + Wine + PyInstaller. Reasons:
  #    * Nuitka compiles Python -> C -> native PE binary. There is
  #      no shared bootloader stub for antivirus engines to
  #      fingerprint, so heuristic false positives (McAfee, Avast,
  #      Bitdefender, Defender, etc.) are drastically reduced.
  #    * PyInstaller --onefile uses the same bootloader for every
  #      build on earth, which is routinely abused by malware and
  #      therefore pre-flagged by many AV vendors on sight.
  #    * Cross-compiling via Wine adds further heuristic weight
  #      (odd section layout, Wine-built import table quirks).
  # =========================================================
  build:
    name: Build Windows .exe (Nuitka)
    runs-on: windows-latest
    needs: prepare  # Wait for version info from prepare stage

    steps:
      # Check out the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Inject the computed version into the VERSION file before build
      # This ensures the .exe embeds the correct version (including pre-release suffix)
      - name: Set version for build
        shell: bash
        run: |
          # Write the computed version (e.g. 1.0.0-beta.3) into VERSION file
          echo "${{ needs.prepare.outputs.version }}" > VERSION
          echo "Building with version: $(cat VERSION)"

      # Install a pinned Python so Nuitka's C compilation is reproducible
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install build and runtime dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Generate the multi-size .ico icon
      - name: Generate application icon
        run: python generate_icon.py app.ico

      # Build the .exe with Nuitka (native PE, low AV false-positive rate)
      - name: Build .exe with Nuitka
        shell: bash
        run: |
          # Read the version injected above
          APP_VERSION=$(cat VERSION | tr -d '[:space:]')

          # Nuitka onefile build. Key anti-FP choices:
          #   - standalone + onefile: self-contained .exe
          #   - windows-console-mode=disable: tray app, no console
          #   - NO UPX, NO packer: AV engines heavily flag packed binaries
          #   - Embed full PE VERSIONINFO so file properties look legitimate
          python -m nuitka \
            --standalone \
            --onefile \
            --assume-yes-for-downloads \
            --windows-console-mode=disable \
            --windows-icon-from-ico=app.ico \
            --company-name="Aditya Bhalsod" \
            --product-name="Auto Warm-Up" \
            --file-version="${APP_VERSION}" \
            --product-version="${APP_VERSION}" \
            --file-description="Keep-alive utility that prevents Windows screen lock" \
            --copyright="Copyright (c) 2024-2026 Aditya Bhalsod. MIT License." \
            --output-dir=dist \
            --output-filename=AutoWarmUp.exe \
            --remove-output \
            auto_warm_up.py

          # Verify the build produced the expected artifact
          ls -lh dist/AutoWarmUp.exe

      # Upload the unsigned .exe as a build artifact for the signing stage
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoWarmUp-unsigned          # Artifact name for the unsigned build
          path: dist/AutoWarmUp.exe          # Path to the built executable
          retention-days: 5                  # Keep artifact for 5 days
          if-no-files-found: error           # Fail if .exe wasn't produced

  # =========================================================
  #  STAGE 3: SIGN — Sign the .exe with a trusted certificate
  #  Priority: SignPath.io → Custom PFX → Self-signed fallback
  # =========================================================
  sign:
    name: Sign .exe
    runs-on: ubuntu-latest
    needs: [prepare, build]  # Wait for version info and the built .exe

    steps:
      # Check out the repo (needed for sign_exe.sh fallback)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the unsigned .exe from the build stage
      - name: Download unsigned .exe
        uses: actions/download-artifact@v4
        with:
          name: AutoWarmUp-unsigned
          path: dist/

      # Detect which signing method is available
      - name: Detect signing method
        id: detect
        run: |
          # Check if SignPath.io secrets are configured
          if [ -n "${SIGNPATH_TOKEN}" ]; then
            echo "method=signpath" >> "$GITHUB_OUTPUT"
            echo "Detected: SignPath.io secrets configured"
          elif [ -n "${PFX_BASE64}" ]; then
            echo "method=pfx" >> "$GITHUB_OUTPUT"
            echo "Detected: Custom PFX certificate configured"
          else
            # No real certificate available. We intentionally do NOT
            # self-sign here because self-signed code-signing certificates
            # HURT antivirus reputation (AV engines treat "unknown publisher"
            # signatures as more suspicious than an unsigned binary).
            echo "method=unsigned" >> "$GITHUB_OUTPUT"
            echo "Detected: No signing secrets — releasing unsigned (better AV reputation than self-signed)"
          fi
        env:
          SIGNPATH_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}

      # Option 1: Sign with SignPath.io (free for open-source projects)
      # Requires: SIGNPATH_API_TOKEN, SIGNPATH_ORGANIZATION_ID,
      #           SIGNPATH_SIGNING_POLICY_SLUG, SIGNPATH_PROJECT_SLUG
      - name: Sign with SignPath.io
        if: steps.detect.outputs.method == 'signpath'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: "AutoWarmUp"
          github-artifact-id: AutoWarmUp-unsigned
          wait-for-completion: true
          output-artifact-directory: dist/signed

      # Move SignPath signed file to the expected location
      - name: Use SignPath signed .exe
        if: steps.detect.outputs.method == 'signpath'
        run: |
          # Replace the unsigned .exe with the SignPath-signed version
          cp dist/signed/AutoWarmUp.exe dist/AutoWarmUp.exe
          echo "Signed with SignPath.io (CA certificate — Publisher will appear)"

      # Option 2: Sign with a real CA-issued PFX certificate, if provided.
      # If no PFX is configured, this step is skipped entirely -- we keep the
      # unsigned binary rather than self-signing, because self-signed binaries
      # typically INCREASE antivirus false-positive rates.
      - name: Sign with CA-issued PFX certificate
        if: steps.detect.outputs.method == 'pfx'
        run: |
          # Install osslsigncode and openssl on the runner
          sudo apt-get update && sudo apt-get install -y --no-install-recommends osslsigncode openssl
          # Run the signing script -- only uses the PFX path (ALLOW_SELF_SIGN unset)
          bash sign_exe.sh dist/AutoWarmUp.exe "Auto Warm-Up" "https://github.com/adityabhalsod/auto-warm-up"
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}

      # Option 3: No signing secrets configured -- release the unsigned binary.
      # This is intentional: self-signing hurts AV reputation more than it helps.
      - name: Skip signing (no CA certificate configured)
        if: steps.detect.outputs.method == 'unsigned'
        run: |
          echo "No code-signing certificate configured -- releasing unsigned binary."
          echo "This is intentional: self-signed certificates increase AV false positives."
          echo "To sign properly, configure SignPath.io or a CA-issued PFX certificate."

      # Verify the signature on the final .exe
      - name: Verify .exe signature
        run: |
          sudo apt-get install -y --no-install-recommends osslsigncode 2>/dev/null || true
          echo "=== Signature Verification ==="
          osslsigncode verify dist/AutoWarmUp.exe 2>&1 | head -15 || true
          echo ""
          echo "=== File Details ==="
          file dist/AutoWarmUp.exe
          ls -lh dist/AutoWarmUp.exe

      # Upload the signed .exe for the release stage
      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoWarmUp-exe               # Final artifact name for release
          path: dist/AutoWarmUp.exe
          retention-days: 5
          if-no-files-found: error

  # =========================================================
  #  STAGE 3: RELEASE — Tag repo and publish GitHub Release
  # =========================================================
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, sign]  # Wait for version info and the signed .exe

    permissions:
      contents: write  # Required to create tags and releases

    steps:
      # Check out the repo (needed for git tagging)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the signed .exe artifact from the build stage
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoWarmUp-exe   # Must match the upload artifact name
          path: dist/            # Download into the dist/ directory

      # Create a git tag for this version and push it
      - name: Create git tag
        run: |
          # Configure git identity for the tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create and push the annotated tag
          TAG="${{ needs.prepare.outputs.tag }}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      # Publish a GitHub Release with the signed .exe attached
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}         # e.g. v1.0.0 or v1.0.0-beta.3
          name: Auto Warm-Up ${{ needs.prepare.outputs.version }}  # Release title
          body: |
            ## Auto Warm-Up ${{ needs.prepare.outputs.version }}

            **Channel:** ${{ needs.prepare.outputs.channel }}
            **Branch:** ${{ github.ref_name }}

            ${{ needs.prepare.outputs.changelog }}

            ---

            ### Binary Details
            - **Builder:** Nuitka (Python compiled to native C/PE — low antivirus false-positive rate)
            - **Icon:** Embedded multi-resolution application icon
            - **Version Info:** PE metadata with company, description, and version
            - **Code Signing:** Signed only when a CA certificate is configured on the project; otherwise released unsigned (self-signing is intentionally avoided because it increases AV false positives)
            - **Auto-Start:** Right-click tray icon → "Start on Boot" to enable
            - **No installation required** — just download and double-click

            > 💡 Download `AutoWarmUp.exe` below and double-click to run.
          prerelease: ${{ needs.prepare.outputs.prerelease }}  # Mark beta/alpha as pre-release
          files: dist/AutoWarmUp.exe                           # Attach the signed .exe as release asset
